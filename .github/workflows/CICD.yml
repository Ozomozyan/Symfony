name: Continuous Deployment to Alwaysdata with Symfony

on:
  push:
jobs:
  Setup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Connection
        uses: appleboy/ssh-action@master
        with:
          host: "ssh-${{ secrets.USERNAME }}.alwaysdata.net"
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd $HOME/www/
  Deploy:
    needs: Setup
    runs-on: ubuntu-latest
    steps:
      - name: SSH Connection for Deployment
        uses: appleboy/ssh-action@master
        with:
          host: "ssh-${{ secrets.USERNAME }}.alwaysdata.net"
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            last_directory=$(basename ${{ runner.workspace }})
            cd $HOME/www/
            git clone https://github.com/${{ github.repository }}.git
            # Checking if the Symfony project directory exists
            if [ -d "./symfony" ]; then
              rsync -r ./$last_directory/ ./symfony
              rm -rf ./$last_directory
              # Symfony specific commands for cache clear and possible migrations
              cd ./symfony
              php bin/console cache:clear
              php bin/console doctrine:migrations:migrate --no-interaction
            else
              echo "The target directory 'symfony' does not exist on your server."
              exit 1
  Restart:
    needs: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Restart Alwaysdata site
        run: |
          response_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST --basic --user "${{ secrets.ALWAYSDATA_TOKEN }}:" https://api.alwaysdata.com/v1/site/${{ secrets.ALWAYSDATA_SITE_ID }}/restart/)
          if [ "$response_code" -eq 204 ]; then
            echo "Site restart successful"
          elif [ "$response_code" -eq 404 ]; then
            echo "The ALWAYSDATA_SITE_ID secret is incorrect"
            exit 1
          elif [ "$response_code" -eq 401 ]; then
            echo "The ALWAYSDATA_TOKEN secret is incorrect"
            exit 1
          else
            echo "Restart failed with response code: $response_code"
            exit 1
